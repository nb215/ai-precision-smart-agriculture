
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yield Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="module-page">
        <div class="form-card enhanced-form-card">
            <div class="page-header">
                <div>
                    <h1>Yield Prediction</h1>
                    <p>Estimate crop yield using soil, environmental, and farm management details.</p>
                </div>
                <a href="/" class="back-btn">← Back to Dashboard</a>
            </div>

            <div class="module-tip">
                <strong>Tip:</strong> Use sample data to instantly test the model.
            </div>

            <form id="yieldForm" class="smart-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="Crop">Crop</label>
                        <select id="Crop" required>
                            <option value="">Select Crop</option>
                            <option value="Wheat">Wheat</option>
                            <option value="Rice">Rice</option>
                            <option value="Maize">Maize</option>
                            <option value="Barley">Barley</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Region">Region</label>
                        <select id="Region" required>
                            <option value="">Select Region</option>
                            <option value="Region_A">Region_A</option>
                            <option value="Region_B">Region_B</option>
                            <option value="Region_C">Region_C</option>
                            <option value="Region_D">Region_D</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Soil_Type">Soil Type</label>
                        <select id="Soil_Type" required>
                            <option value="">Select Soil Type</option>
                            <option value="Clay">Clay</option>
                            <option value="Loam">Loam</option>
                            <option value="Sandy">Sandy</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Soil_pH">Soil pH</label>
                        <input type="number" step="0.01" id="Soil_pH" placeholder="e.g. 6.8" required>
                    </div>

                    <div class="input-group">
                        <label for="Rainfall_mm">Rainfall (mm)</label>
                        <input type="number" step="0.01" id="Rainfall_mm" placeholder="e.g. 950" required>
                    </div>

                    <div class="input-group">
                        <label for="Temperature_C">Temperature (°C)</label>
                        <input type="number" step="0.01" id="Temperature_C" placeholder="e.g. 27" required>
                    </div>

                    <div class="input-group">
                        <label for="Humidity_pct">Humidity (%)</label>
                        <input type="number" step="0.01" id="Humidity_pct" placeholder="e.g. 65" required>
                    </div>

                    <div class="input-group">
                        <label for="Fertilizer_Used_kg">Fertilizer Used (kg)</label>
                        <input type="number" step="0.01" id="Fertilizer_Used_kg" placeholder="e.g. 180" required>
                    </div>

                    <div class="input-group">
                        <label for="Irrigation">Irrigation</label>
                        <select id="Irrigation" required>
                            <option value="">Select Irrigation</option>
                            <option value="Drip">Drip</option>
                            <option value="Sprinkler">Sprinkler</option>
                            <option value="Flood">Flood</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Pesticides_Used_kg">Pesticides Used (kg)</label>
                        <input type="number" step="0.01" id="Pesticides_Used_kg" placeholder="e.g. 20" required>
                    </div>

                    <div class="input-group">
                        <label for="Planting_Density">Planting Density</label>
                        <input type="number" step="0.01" id="Planting_Density" placeholder="e.g. 14" required>
                    </div>

                    <div class="input-group">
                        <label for="Previous_Crop">Previous Crop</label>
                        <select id="Previous_Crop" required>
                            <option value="">Select Previous Crop</option>
                            <option value="Wheat">Wheat</option>
                            <option value="Rice">Rice</option>
                            <option value="Maize">Maize</option>
                            <option value="Barley">Barley</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit" class="primary-btn">Predict Yield</button>
                    <button type="button" class="secondary-btn" onclick="fillYieldSampleData()">Use Sample Data</button>
                    <button type="reset" class="secondary-btn" onclick="resetYieldUI()">Reset</button>
                </div>
            </form>

            <div id="yieldLoadingBox" class="loading-box hidden">
                ⏳ Processing yield prediction...
            </div>

            <div id="yieldResultBox" class="result-box hidden">
                <h2>Predicted Yield</h2>
                <p id="yieldResultText"></p>
                <span class="result-subtext">tons per hectare</span>
            </div>

            <div id="yieldInsightBox" class="insight-box hidden">
                <h3>Quick Insight</h3>
                <p id="yieldInsightText"></p>
            </div>

            <div id="yieldErrorBox" class="error-box hidden">
                <p id="yieldErrorText"></p>
            </div>
        </div>
    </div>

    <script>
        const yieldForm = document.getElementById("yieldForm");
        const yieldLoadingBox = document.getElementById("yieldLoadingBox");
        const yieldResultBox = document.getElementById("yieldResultBox");
        const yieldResultText = document.getElementById("yieldResultText");
        const yieldInsightBox = document.getElementById("yieldInsightBox");
        const yieldInsightText = document.getElementById("yieldInsightText");
        const yieldErrorBox = document.getElementById("yieldErrorBox");
        const yieldErrorText = document.getElementById("yieldErrorText");

        yieldForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            yieldLoadingBox.classList.remove("hidden");
            yieldResultBox.classList.add("hidden");
            yieldInsightBox.classList.add("hidden");
            yieldErrorBox.classList.add("hidden");

            const data = {
                Crop: document.getElementById("Crop").value,
                Region: document.getElementById("Region").value,
                Soil_Type: document.getElementById("Soil_Type").value,
                Soil_pH: document.getElementById("Soil_pH").value,
                Rainfall_mm: document.getElementById("Rainfall_mm").value,
                Temperature_C: document.getElementById("Temperature_C").value,
                Humidity_pct: document.getElementById("Humidity_pct").value,
                Fertilizer_Used_kg: document.getElementById("Fertilizer_Used_kg").value,
                Irrigation: document.getElementById("Irrigation").value,
                Pesticides_Used_kg: document.getElementById("Pesticides_Used_kg").value,
                Planting_Density: document.getElementById("Planting_Density").value,
                Previous_Crop: document.getElementById("Previous_Crop").value
            };

            try {
                const response = await fetch("/predict-yield", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                yieldLoadingBox.classList.add("hidden");

                if (result.success) {
                    const predictedYield = result.predicted_yield;
                    yieldResultText.innerText = predictedYield;
                    localStorage.setItem("lastYieldPrediction", predictedYield + " ton/ha");

                    let insight = "";
                    if (predictedYield >= 160) {
                        insight = "High estimated yield. Current farm conditions appear very favorable.";
                    } else if (predictedYield >= 110) {
                        insight = "Moderate to good yield expected. Some optimization may further improve output.";
                    } else {
                        insight = "Lower expected yield. Review rainfall, fertilizer use, and planting density.";
                    }

                    yieldInsightText.innerText = insight;
                    yieldResultBox.classList.remove("hidden");
                    yieldInsightBox.classList.remove("hidden");
                } else {
                    yieldErrorText.innerText = result.error || "Something went wrong.";
                    yieldErrorBox.classList.remove("hidden");
                }
            } catch (error) {
                yieldLoadingBox.classList.add("hidden");
                yieldErrorText.innerText = "Unable to connect to the server.";
                yieldErrorBox.classList.remove("hidden");
            }
        });

        function fillYieldSampleData() {
            document.getElementById("Crop").value = "Maize";
            document.getElementById("Region").value = "Region_C";
            document.getElementById("Soil_Type").value = "Sandy";
            document.getElementById("Soil_pH").value = "7.01";
            document.getElementById("Rainfall_mm").value = "1485.4";
            document.getElementById("Temperature_C").value = "19.7";
            document.getElementById("Humidity_pct").value = "40.3";
            document.getElementById("Fertilizer_Used_kg").value = "105.1";
            document.getElementById("Irrigation").value = "Drip";
            document.getElementById("Pesticides_Used_kg").value = "10.2";
            document.getElementById("Planting_Density").value = "23.2";
            document.getElementById("Previous_Crop").value = "Rice";
        }

        function resetYieldUI() {
            yieldResultBox.classList.add("hidden");
            yieldInsightBox.classList.add("hidden");
            yieldErrorBox.classList.add("hidden");
            yieldLoadingBox.classList.add("hidden");
        }
    </script>
</body>
</html>
