
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <div class="page-header">
                <h1>Fertilizer Recommendation</h1>
                <p>Enter soil, crop, and environmental details to get the recommended fertilizer.</p>
            </div>

            <form id="fertilizerForm" class="smart-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="Soil_Type">Soil Type</label>
                        <select id="Soil_Type" required>
                            <option value="">Select</option>
                            <option value="Clay">Clay</option>
                            <option value="Sandy">Sandy</option>
                            <option value="Silt">Silt</option>
                            <option value="Loamy">Loamy</option>
                            <option value="Peaty">Peaty</option>
                            <option value="Chalky">Chalky</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Soil_pH">Soil pH</label>
                        <input type="number" step="0.01" id="Soil_pH" placeholder="e.g. 6.5" required>
                    </div>

                    <div class="input-group">
                        <label for="Soil_Moisture">Soil Moisture</label>
                        <input type="number" step="0.01" id="Soil_Moisture" placeholder="e.g. 35.0" required>
                    </div>

                    <div class="input-group">
                        <label for="Organic_Carbon">Organic Carbon</label>
                        <input type="number" step="0.01" id="Organic_Carbon" placeholder="e.g. 0.8" required>
                    </div>

                    <div class="input-group">
                        <label for="Electrical_Conductivity">Electrical Conductivity</label>
                        <input type="number" step="0.01" id="Electrical_Conductivity" placeholder="e.g. 1.2" required>
                    </div>

                    <div class="input-group">
                        <label for="Nitrogen_Level">Nitrogen Level</label>
                        <input type="number" id="Nitrogen_Level" placeholder="e.g. 70" required>
                    </div>

                    <div class="input-group">
                        <label for="Phosphorus_Level">Phosphorus Level</label>
                        <input type="number" id="Phosphorus_Level" placeholder="e.g. 40" required>
                    </div>

                    <div class="input-group">
                        <label for="Potassium_Level">Potassium Level</label>
                        <input type="number" id="Potassium_Level" placeholder="e.g. 60" required>
                    </div>

                    <div class="input-group">
                        <label for="Temperature">Temperature</label>
                        <input type="number" step="0.01" id="Temperature" placeholder="e.g. 25.0" required>
                    </div>

                    <div class="input-group">
                        <label for="Humidity">Humidity</label>
                        <input type="number" step="0.01" id="Humidity" placeholder="e.g. 65.0" required>
                    </div>

                    <div class="input-group">
                        <label for="Rainfall">Rainfall</label>
                        <input type="number" step="0.01" id="Rainfall" placeholder="e.g. 1200" required>
                    </div>

                    <div class="input-group">
                        <label for="Crop_Type">Crop Type</label>
                        <select id="Crop_Type" required>
                            <option value="">Select</option>
                            <option value="Wheat">Wheat</option>
                            <option value="Rice">Rice</option>
                            <option value="Maize">Maize</option>
                            <option value="Cotton">Cotton</option>
                            <option value="Potato">Potato</option>
                            <option value="Tomato">Tomato</option>
                            <option value="Sugarcane">Sugarcane</option>
                            <option value="Barley">Barley</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Crop_Growth_Stage">Crop Growth Stage</label>
                        <select id="Crop_Growth_Stage" required>
                            <option value="">Select</option>
                            <option value="Sowing">Sowing</option>
                            <option value="Vegetative">Vegetative</option>
                            <option value="Flowering">Flowering</option>
                            <option value="Harvest">Harvest</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Season">Season</label>
                        <select id="Season" required>
                            <option value="">Select</option>
                            <option value="Kharif">Kharif</option>
                            <option value="Rabi">Rabi</option>
                            <option value="Zaid">Zaid</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Irrigation_Type">Irrigation Type</label>
                        <select id="Irrigation_Type" required>
                            <option value="">Select</option>
                            <option value="Canal">Canal</option>
                            <option value="Drip">Drip</option>
                            <option value="Sprinkler">Sprinkler</option>
                            <option value="Rainfed">Rainfed</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Previous_Crop">Previous Crop</label>
                        <select id="Previous_Crop" required>
                            <option value="">Select</option>
                            <option value="Wheat">Wheat</option>
                            <option value="Rice">Rice</option>
                            <option value="Maize">Maize</option>
                            <option value="Cotton">Cotton</option>
                            <option value="Potato">Potato</option>
                            <option value="Tomato">Tomato</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Region">Region</label>
                        <select id="Region" required>
                            <option value="">Select</option>
                            <option value="North">North</option>
                            <option value="South">South</option>
                            <option value="East">East</option>
                            <option value="West">West</option>
                            <option value="Central">Central</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="Fertilizer_Used_Last_Season">Fertilizer Used Last Season</label>
                        <input type="number" step="0.01" id="Fertilizer_Used_Last_Season" placeholder="e.g. 150" required>
                    </div>

                    <div class="input-group">
                        <label for="Yield_Last_Season">Yield Last Season</label>
                        <input type="number" step="0.01" id="Yield_Last_Season" placeholder="e.g. 4.5" required>
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit" class="primary-btn">Get Recommendation</button>
                    <button type="button" class="secondary-btn" onclick="fillSampleData()">Use Sample Data</button>
                    <button type="reset" class="secondary-btn">Reset</button>
                </div>
            </form>

            <div id="loadingBox" class="loading-box hidden">
                Analyzing input and generating fertilizer recommendation...
            </div>

            <div id="resultBox" class="result-box hidden">
                <h2>Recommended Fertilizer</h2>
                <p id="resultText"></p>
            </div>

            <div id="errorBox" class="error-box hidden">
                <p id="errorText"></p>
            </div>
        </div>
    </div>

    <script>
        const fertilizerForm = document.getElementById("fertilizerForm");
        const resultBox = document.getElementById("resultBox");
        const resultText = document.getElementById("resultText");
        const errorBox = document.getElementById("errorBox");
        const errorText = document.getElementById("errorText");
        const loadingBox = document.getElementById("loadingBox");

        fertilizerForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            resultBox.classList.add("hidden");
            errorBox.classList.add("hidden");
            loadingBox.classList.remove("hidden");

            const data = {
                Soil_Type: document.getElementById("Soil_Type").value,
                Soil_pH: document.getElementById("Soil_pH").value,
                Soil_Moisture: document.getElementById("Soil_Moisture").value,
                Organic_Carbon: document.getElementById("Organic_Carbon").value,
                Electrical_Conductivity: document.getElementById("Electrical_Conductivity").value,
                Nitrogen_Level: document.getElementById("Nitrogen_Level").value,
                Phosphorus_Level: document.getElementById("Phosphorus_Level").value,
                Potassium_Level: document.getElementById("Potassium_Level").value,
                Temperature: document.getElementById("Temperature").value,
                Humidity: document.getElementById("Humidity").value,
                Rainfall: document.getElementById("Rainfall").value,
                Crop_Type: document.getElementById("Crop_Type").value,
                Crop_Growth_Stage: document.getElementById("Crop_Growth_Stage").value,
                Season: document.getElementById("Season").value,
                Irrigation_Type: document.getElementById("Irrigation_Type").value,
                Previous_Crop: document.getElementById("Previous_Crop").value,
                Region: document.getElementById("Region").value,
                Fertilizer_Used_Last_Season: document.getElementById("Fertilizer_Used_Last_Season").value,
                Yield_Last_Season: document.getElementById("Yield_Last_Season").value
            };

            try {
                const response = await fetch("/predict-fertilizer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                loadingBox.classList.add("hidden");

                if (result.success) {
                    resultText.innerText = result.recommended_fertilizer;
                    localStorage.setItem("lastFertilizerPrediction", result.recommended_fertilizer);
                    resultBox.classList.remove("hidden");
                } else {
                    errorText.innerText = result.error || "Something went wrong.";
                    errorBox.classList.remove("hidden");
                }

            } catch (error) {
                loadingBox.classList.add("hidden");
                errorText.innerText = "Unable to connect to server.";
                errorBox.classList.remove("hidden");
            }
        });

        function fillSampleData() {
            document.getElementById("Soil_Type").value = "Clay";
            document.getElementById("Soil_pH").value = "6.5";
            document.getElementById("Soil_Moisture").value = "35";
            document.getElementById("Organic_Carbon").value = "0.8";
            document.getElementById("Electrical_Conductivity").value = "1.2";
            document.getElementById("Nitrogen_Level").value = "70";
            document.getElementById("Phosphorus_Level").value = "40";
            document.getElementById("Potassium_Level").value = "60";
            document.getElementById("Temperature").value = "25";
            document.getElementById("Humidity").value = "65";
            document.getElementById("Rainfall").value = "1200";
            document.getElementById("Crop_Type").value = "Wheat";
            document.getElementById("Crop_Growth_Stage").value = "Vegetative";
            document.getElementById("Season").value = "Rabi";
            document.getElementById("Irrigation_Type").value = "Canal";
            document.getElementById("Previous_Crop").value = "Rice";
            document.getElementById("Region").value = "North";
            document.getElementById("Fertilizer_Used_Last_Season").value = "150";
            document.getElementById("Yield_Last_Season").value = "4.5";
        }
    </script>
</body>
</html>
